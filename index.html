<!DOCTYPE html>
<html>
<head>
  <title>RS Clock</title>
<style>
  body {
    margin: 0;
    background: rgba(20, 20, 20, 0.85);
    font-family: "Trebuchet MS", Verdana, sans-serif;
    overflow: hidden;
  }

  #container {
    padding: 8px 12px;
    border: 2px solid #3a2f1b;
    background: linear-gradient(to bottom, #2b2418, #1a1712);
    box-shadow: inset 0 0 8px #000;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 6px;
  }

  #clock {
    color: #ffd700;
    font-size: 16px;
    text-shadow: 1px 1px 2px #000;
    letter-spacing: 0.5px;
  }

  #bell {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    transition: opacity 0.2s;
    user-select: none;
  }
</style>
</head>

<body>
<div id="container">
  <div id="clock"></div>
  <span id="bell" onclick="toggleClock()">🔔</span>
</div>

<script>
let clockEnabled = localStorage.getItem("clockEnabled") !== "false";

function updateBell() {
  const bell = document.getElementById("bell");
  bell.textContent = clockEnabled ? "🔔" : "🔕";
  bell.style.opacity = clockEnabled ? "1" : "0.4";
}

function toggleClock() {
  clockEnabled = !clockEnabled;
  localStorage.setItem("clockEnabled", clockEnabled);
  updateBell();
}

function updateClock() {
  const now = new Date();

  const options = {
    month: 'short',
    day: 'numeric',
    year: 'numeric'
  };

  const datePart = now.toLocaleDateString('en-US', options);

  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? 'pm' : 'am';
  hours = hours % 12 || 12;

  const timeString = `${datePart} ${hours}:${minutes}${ampm}`;

  if (clockEnabled) {
    document.getElementById("clock").innerText = timeString;
    document.title = `RS Clock | ${timeString}`;
  } else {
    document.getElementById("clock").innerText = "Clock paused";
    document.title = "RS Clock | Paused";
  }
}

updateBell();
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
